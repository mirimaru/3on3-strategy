            {"名前":"ロイド","en":"Lyoid","pos":"C","s":[208,132,132,196,144,144,106,183,68,93,144,221,208,55,133]},
            {"名前":"シアナ","en":"Siana","pos":"C","s":[229,51,39,204,152,229,140,114,63,127,229,178,227,76,160]}
        ];

        const maxStats = {};
        ["PG", "SG", "SF", "PF", "C"].forEach(p => {
            maxStats[p] = Array(15).fill(0);
            rawData.filter(c => c.pos === p).forEach(c => {
                c.s.forEach((v, i) => { if (v > maxStats[p][i]) maxStats[p][i] = v; });
            });
        });

        function showPage(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => {
                l.classList.remove('active');
                if(l.innerText === id.toUpperCase() || (id === 'db' && l.innerText === 'DATABASE')) l.classList.add('active');
            });
            if(id === 'db') { if(document.getElementById('grid').children.length === 0) initDb(); }
            if(id === 'comp') populateCompare();
            window.scrollTo(0,0);
        }

        function initDb() {
            const grid = document.getElementById('grid');
            rawData.forEach(c => {
                const card = document.createElement('div');
                card.className = 'char-card fade-in';
                card.dataset.name = c.名前.toLowerCase();
                card.dataset.pos = c.pos;
                let sHtml = '<div class="stat-grid">';
                c.s.forEach((v, i) => {
                    const isMax = v === maxStats[c.pos][i];
                    sHtml += `<div class="stat-box"><div class="stat-lbl">${statNames[i]}</div><div class="stat-val ${isMax ? 'is-max' : ''}">${v}</div></div>`;
                });
                sHtml += '</div>';
                const imgUrl = charImages[c.en] || '';
                card.innerHTML = `<div class="char-content"><div class="char-name">${c.名前}</div><div class="char-pos">${c.pos}</div>${sHtml}</div><img src="${imgUrl}" class="char-img" loading="lazy">`;
                grid.appendChild(card);
            });
        }

        function filterCards() {
            const search = document.getElementById('nameInput').value.toLowerCase();
            const posFilter = document.getElementById('posFilter').value;
            const cards = document.querySelectorAll('.char-card');
            cards.forEach(card => {
                const nameMatch = card.dataset.name.includes(search);
                const posMatch = posFilter === 'All' || card.dataset.pos === posFilter;
                if(nameMatch && posMatch) card.classList.remove('hidden');
                else card.classList.add('hidden');
            });
        }

        function populateCompare() {
            const s1 = document.getElementById('char1Sel'); const s2 = document.getElementById('char2Sel');
            if(s1.options.length > 0) return;
            const o = rawData.map(c => `<option value="${c.名前}">${c.名前} [${c.pos}]</option>`).join('');
            s1.innerHTML = o; s2.innerHTML = o; s1.selectedIndex = 0; s2.selectedIndex = 1;
            updateCompare();
        }

        function updateCompare() {
            const c1 = rawData.find(c => c.名前 === document.getElementById('char1Sel').value);
            const c2 = rawData.find(c => c.名前 === document.getElementById('char2Sel').value);
            const res = document.getElementById('compareResult');
            let h = '';
            statNames.forEach((n, i) => {
                const v1 = c1.s[i]; const v2 = c2.s[i];
                h += `<div class="flex justify-between items-center bg-black/70 p-4 rounded-xl border border-white/10 mb-1"><span class="w-20 text-center font-black text-2xl ${v1 > v2 ? 'text-white' : 'text-slate-700'}">${v1}</span><span class="text-[11px] font-black text-orange-500 uppercase italic">${n}</span><span class="w-20 text-center font-black text-2xl ${v2 > v1 ? 'text-white' : 'text-slate-700'}">${v2}</span></div>`;
            });
            res.innerHTML = h;
            updateChart(c1, c2);
        }

        let compareChart = null;
        function updateChart(c1, c2) {
            const ctx = document.getElementById('compareChart').getContext('2d');
            if(compareChart) compareChart.destroy();
            compareChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: statNames,
                    datasets: [
                        { label: c1.名前, data: c1.s, backgroundColor: 'rgba(255, 78, 0, 0.4)', borderColor: '#ff4e00' },
                        { label: c2.名前, data: c2.s, backgroundColor: 'rgba(0, 112, 243, 0.4)', borderColor: '#0070f3' }
                    ]
                },
                options: {
                    scales: { r: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { display: false }, pointLabels: { color: '#94a3b8', font: { size: 11, weight: 'bold' } } } },
                    plugins: { legend: { labels: { color: '#fff', font: { weight: 'bold' } } } }
                }
            });
        }
    </script>
</body>
</html>
